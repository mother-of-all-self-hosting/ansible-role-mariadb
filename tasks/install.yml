---
- name: Ensure MariaDB paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ mariadb_uid }}"
    group: "{{ mariadb_gid }}"
  with_items:
    - "{{ mariadb_base_path }}"
    - "{{ mariadb_bin_path }}"
    - "{{ mariadb_data_path }}"

- name: Ensure MariaDB support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ mariadb_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ mariadb_uid }}"
    group: "{{ mariadb_gid }}"
  with_items:
    - env
    - my.cnf
  register: mariadb_support_files_result

- name: Run the utility to determine if there is some existing MariaDB version in use or not
  ansible.builtin.import_tasks: "{{ role_path }}/tasks/detect_existing_version.yml"

# If we have found an existing version (installed from before), we use its corresponding container image.
# If not, we install using the latest MariaDB.
#
# Upgrading is supposed to be performed separately and explicitly (see `upgrade_mariadb.yml`).
- name: Determine the container image to use
  ansible.builtin.set_fact:
    mariadb_container_image_to_use: "{{ mariadb_container_image_latest if mariadb_detected_version_corresponding_container_image == '' else mariadb_detected_version_corresponding_container_image }}"

- name: Abort if the enabled MariaDB version is no longer supported
  ansible.builtin.fail:
    msg: "You're on MariaDB {{ mariadb_detected_version }}, which is no longer supported."
  when: "mariadb_detected_version.startswith('10.9.')"

- name: Ensure MariaDB scripts installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/bin/{{ item }}.j2"
    dest: "{{ mariadb_bin_path }}/{{ item }}"
    mode: "0750"
    owner: "{{ mariadb_uid }}"
    group: "{{ mariadb_gid }}"
  with_items:
    - cli
    - cli-non-interactive
    - dump-all
  register: mariadb_scripts_result

- name: Inject warning if the enabled MariaDB version is not latest
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "NOTE: Your setup is on an old MariaDB version (" + mariadb_container_image_to_use + "), while " + mariadb_container_image_latest + " is supported. You can upgrade using --tags=upgrade-mariadb"
        ]
      }}
  when: "mariadb_container_image_to_use != mariadb_container_image_latest"

- name: Ensure MariaDB container image is pulled via community.docker.docker_image
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image:
    name: "{{ mariadb_container_image_to_use }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ mariadb_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else mariadb_container_image_force_pull }}"
  register: mariadb_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: mariadb_container_image_pull_result_ansible_module is not failed

- name: Ensure MariaDB container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ mariadb_container_image_to_use }}"
  register: mariadb_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: mariadb_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in mariadb_container_image_pull_result_command.stdout"

- name: Ensure MariaDB container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ mariadb_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: mariadb_network_creation_result

- name: Ensure MariaDB container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ mariadb_container_network }}
  register: mariadb_network_creation_result
  changed_when: mariadb_network_creation_result.rc == 0
  failed_when: mariadb_network_creation_result.rc != 0 and 'already exists' not in mariadb_network_creation_result.stderr

- name: Ensure MariaDB service systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/mariadb.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ mariadb_identifier }}.service"
    mode: "0644"
  register: mariadb_systemd_service_result

- name: Ensure managed MariaDB databases prepared
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/util/prepare_managed_databases.yml"
    apply:
      tags:
        - always
  when: "mariadb_managed_databases | length > 0"
  register: mariadb_databases_preparation_result

- name: Determine whether MariaDB needs a restart
  ansible.builtin.set_fact:
    mariadb_restart_necessary: >-
      {{
        mariadb_support_files_result.changed | default(false)
        or mariadb_scripts_result.changed | default(false)
        or mariadb_systemd_service_result.changed | default(false)
        or mariadb_container_image_pull_result_ansible_module.changed | default(false)
        or mariadb_container_image_pull_result_command.changed | default(false)
        or mariadb_databases_preparation_result.changed | default(false)
      }}
